<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📚 书宙漫游 · PDF电子书合集 · 付费意愿调查</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --yes-color: #10b981;
            --no-color: #ef4444;
            --abstain-color: #6b7280;
            --bar-bg: #e5e7eb;
            --radius: 14px;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 0 0 40px;
        }

        /* 封面区 */
        .header {
            text-align: center;
            padding: 32px 20px 28px;
            background: linear-gradient(135deg, #1a73e8 0%, #4285f4 50%, #6ea2ff 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 160px;
            height: 160px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }

        .book-icon {
            font-size: 52px;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .header .subtitle {
            font-size: 13px;
            opacity: 0.85;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 11px;
            margin-top: 10px;
            backdrop-filter: blur(4px);
        }

        /* 调查卡片 */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* 商品说明 */
        .product-info {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 6px;
        }

        .product-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }

        .product-row .label {
            color: var(--text-light);
        }

        .product-row .value {
            font-weight: 600;
            color: var(--text);
        }

        .product-row .value.highlight {
            color: var(--primary);
            font-size: 16px;
        }

        .product-row .value.price {
            color: #f59e0b;
            font-size: 16px;
        }

        .product-row .value.note {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-light);
        }

        .price-tag {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff3cd, #fff8e1);
            border: 1px solid #ffe082;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            gap: 8px;
        }

        .price-tag .num {
            font-size: 32px;
            font-weight: 800;
            color: #f59e0b;
        }

        .price-tag .unit {
            font-size: 14px;
            color: #f59e0b;
        }

        .price-tag .desc {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.4;
        }

        /* 投票选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 16px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .option.selected.yes {
            border-color: var(--yes-color);
            background: #ecfdf5;
        }

        .option.selected.no {
            border-color: var(--no-color);
            background: #fef2f2;
        }

        .option.selected.abstain {
            border-color: var(--abstain-color);
            background: #f9fafb;
        }

        .option .radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--border);
            margin-right: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option.selected.yes .radio {
            border-color: var(--yes-color);
            background: var(--yes-color);
        }

        .option.selected.no .radio {
            border-color: var(--no-color);
            background: var(--no-color);
        }

        .option.selected.abstain .radio {
            border-color: var(--abstain-color);
            background: var(--abstain-color);
        }

        .option .radio::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .option.selected .radio::after {
            opacity: 1;
        }

        .option .opt-content {
            flex: 1;
        }

        .option .opt-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .option .opt-desc {
            font-size: 12px;
            color: var(--text-light);
            line-height: 1.4;
        }

        .option .opt-icon {
            font-size: 24px;
            margin-left: 10px;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* 结果区 */
        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-bar-group {
            margin-bottom: 18px;
        }

        .result-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .result-bar-label .label {
            font-weight: 600;
        }

        .result-bar-label .pct {
            color: var(--text-light);
        }

        .result-bar-label .count {
            font-size: 11px;
            color: var(--text-light);
            margin-left: 6px;
        }

        .result-bar {
            height: 28px;
            background: var(--bar-bg);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .result-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            padding-left: 12px;
            min-width: 40px;
        }

        .result-bar-fill span {
            color: white;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .result-bar-fill.yes { background: linear-gradient(90deg, #10b981, #34d399); }
        .result-bar-fill.no { background: linear-gradient(90deg, #ef4444, #f87171); }
        .result-bar-fill.abstain { background: linear-gradient(90deg, #6b7280, #9ca3af); }

        .result-total {
            text-align: center;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 10px;
            margin-top: 8px;
        }

        .result-total .num {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        .result-total .label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* 隐私提示 */
        .privacy-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 18px 0;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.85);
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 动画入场 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeInUp 0.4s ease; }
        .header { animation: fadeInUp 0.4s ease; }

        /* 公众号场景优化 */
        @media screen and (max-width: 480px) {
            body { padding: 0; background: white; }
            .container { max-width: 100%; padding: 0 0 20px; }
            .card { border-radius: 0; box-shadow: none; border-bottom: 1px solid var(--border); margin-bottom: 0; }
            .header { border-radius: 0; }
            .option { padding: 14px 16px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 封面 -->
    <div class="header">
        <div class="book-icon">📚</div>
        <h1>书宙漫游</h1>
        <div class="subtitle">公众号文章100本PDF资料合集<br>计划限时有偿发布</div>
        <div class="badge">📊 读者意愿统计 · 匿名参与</div>
    </div>

    <!-- 调查内容 -->
    <div class="card" id="surveyCard" style="position:relative;">
        <div class="card-title">请回答以下问题</div>

        <!-- 商品说明 -->
        <div class="product-info">
            <div class="product-row">
                <span class="label">内容形式</span>
                <span class="value">PDF电子资料合集</span>
            </div>
            <div class="product-row">
                <span class="label">内容规模</span>
                <span class="value highlight">到100篇文章时发100本</span>
            </div>
            <div class="product-row">
                <span class="label">书籍来源</span>
                <span class="value note">网络搜索并格式整理</span>
            </div>
            <div class="product-row">
                <span class="label">获取方式</span>
                <span class="value">百度网盘下载</span>
            </div>

            <div class="price-tag">
                <span class="num">¥10</span>
                <div>
                    <div class="unit">一次性付费</div>
                    <div class="desc">获取100本PDF合集</div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 核心问题 -->
        <div class="card-title">您愿意付费吗？</div>

        <div class="options" id="options">
            <div class="option" data-choice="yes" onclick="selectOption(this)">
                <div class="radio"></div>
                <div class="opt-content">
                    <div class="opt-title">✅ 愿意购买</div>
                    <div class="opt-desc">10元获取全部书籍，值得尝试</div>
                </div>
                <div class="opt-icon">💚</div>
            </div>

            <div class="option" data-choice="no" onclick="selectOption(this)">
                <div class="radio"></div>
                <div class="opt-content">
                    <div class="opt-title">❌ 暂不购买</div>
                    <div class="opt-desc">价格合适，但暂时不需要</div>
                </div>
                <div class="opt-icon">🔴</div>
            </div>

            <div class="option" data-choice="abstain" onclick="selectOption(this)">
                <div class="radio"></div>
                <div class="opt-content">
                    <div class="opt-title">🤔 还在观望</div>
                    <div class="opt-desc">希望了解更多细节后再决定</div>
                </div>
                <div class="opt-icon">🟡</div>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitVote()" disabled>
            提交投票
        </button>

        <div class="hint" id="hintText">请先选择一个选项</div>

        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div style="font-size:13px;color:var(--text-light);">提交中...</div>
        </div>
    </div>

    <!-- 结果展示 -->
    <div class="card results" id="resultsCard">
        <div class="card-title">📊 实时统计结果</div>
        <div id="resultsContent">
            <div style="text-align:center;padding:20px;color:var(--text-light);">正在加载数据…</div>
        </div>
        <div class="divider"></div>
        <div class="result-total">
            <div class="num" id="totalNum">-</div>
            <div class="label">人已参与投票</div>
        </div>
    </div>

    <!-- 隐私说明 -->
    <div class="card">
        <div class="privacy-note">
            🔒 匿名统计 · 您的选择仅用于数据汇总 · 无法追溯个人
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
    // ===== CountAPI 实时统计配置 =====
    const NS = 'shuzhou-survey-2026';
    const KEYS = { yes: 'vote-yes', no: 'vote-no', abstain: 'vote-abstain' };

    function countHit(key) {
        return fetch('https://api.countapi.xyz/hit/' + NS + '/' + key)
            .then(function(r) { return r.json(); })
            .catch(function() { return { value: null }; });
    }
    function countGet(key) {
        return fetch('https://api.countapi.xyz/get/' + NS + '/' + key)
            .then(function(r) { return r.json(); })
            .catch(function() { return { value: null }; });
    }

    // ===== 投票逻辑 =====
    const STORAGE_KEY = 'shuzhou_vote_2026';
    let selectedChoice = null;
    let voted = false;

    // 检查是否已投过票
    if (localStorage.getItem(STORAGE_KEY)) {
        voted = true;
        document.getElementById('surveyCard').style.display = 'none';
        loadAndShowResults();
    }

    function selectOption(el) {
        if (voted) return;
        document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
        el.classList.add('selected');
        selectedChoice = el.dataset.choice;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('hintText').textContent = '您选择了：' + el.querySelector('.opt-title').textContent;
    }

    function submitVote() {
        if (!selectedChoice) return;

        var overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('show');
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;

        // 写入 CountAPI
        countHit(KEYS[selectedChoice]).then(function() {
            voted = true;
            localStorage.setItem(STORAGE_KEY, 'voted');
            overlay.classList.remove('show');

            document.getElementById('surveyCard').style.display = 'none';
            loadAndShowResults();

            showToast('✅ 投票成功，感谢参与！');
        });
    }

    // 加载并渲染统计
    function loadAndShowResults() {
        document.getElementById('resultsCard').classList.add('show');

        Promise.all([
            countGet(KEYS.yes),
            countGet(KEYS.no),
            countGet(KEYS.abstain)
        ]).then(function(results) {
            var yes = Math.max(0, results[0].value || 0);
            var no = Math.max(0, results[1].value || 0);
            var abstain = Math.max(0, results[2].value || 0);
            var total = yes + no + abstain;

            document.getElementById('totalNum').textContent = total;

            var yesPct = total ? Math.round(yes / total * 100) : 0;
            var noPct = total ? Math.round(no / total * 100) : 0;
            var abstainPct = total ? (100 - yesPct - noPct) : 0;

            var html = ''
                + '<div class="result-bar-group">'
                + '  <div class="result-bar-label">'
                + '    <span class="label">✅ 愿意购买</span>'
                + '    <span><span class="pct">' + yesPct + '%</span><span class="count">(' + yes + '人)</span></span>'
                + '  </div>'
                + '  <div class="result-bar">'
                + '    <div class="result-bar-fill yes" style="width:0%">'
                + (yesPct > 5 ? '      <span>' + yesPct + '%</span>' : '')
                + '    </div>'
                + '  </div>'
                + '</div>'
                + '<div class="result-bar-group">'
                + '  <div class="result-bar-label">'
                + '    <span class="label">❌ 暂不购买</span>'
                + '    <span><span class="pct">' + noPct + '%</span><span class="count">(' + no + '人)</span></span>'
                + '  </div>'
                + '  <div class="result-bar">'
                + '    <div class="result-bar-fill no" style="width:0%">'
                + (noPct > 5 ? '      <span>' + noPct + '%</span>' : '')
                + '    </div>'
                + '  </div>'
                + '</div>'
                + '<div class="result-bar-group">'
                + '  <div class="result-bar-label">'
                + '    <span class="label">🤔 还在观望</span>'
                + '    <span><span class="pct">' + abstainPct + '%</span><span class="count">(' + abstain + '人)</span></span>'
                + '  </div>'
                + '  <div class="result-bar">'
                + '    <div class="result-bar-fill abstain" style="width:0%">'
                + (abstainPct > 5 ? '      <span>' + abstainPct + '%</span>' : '')
                + '    </div>'
                + '  </div>'
                + '</div>';

            document.getElementById('resultsContent').innerHTML = html;

            // 延迟触发进度条动画
            requestAnimationFrame(function() {
                setTimeout(function() {
                    var bars = document.querySelectorAll('.result-bar-fill');
                    if (bars[0]) bars[0].style.width = yesPct + '%';
                    if (bars[1]) bars[1].style.width = noPct + '%';
                    if (bars[2]) bars[2].style.width = abstainPct + '%';
                }, 100);
            });
        }).catch(function() {
            document.getElementById('resultsContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light);">数据加载失败，请稍后刷新</div>';
        });
    }

    function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }
</script>

</body>
</html>
